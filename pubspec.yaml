name: tradedesk
description: A professional paper trading app for Nifty stocks and F&O options simulation
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^3.1.0
  hooks_riverpod: ^3.1.0
  riverpod_generator: ^4.0.0+1
  riverpod_annotation: ^4.0.0
  state_notifier: ^1.0.0

  # Navigation
  go_router: ^17.2.3

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking
  dio: ^5.6.0
  web_socket_channel: ^3.0.1
  connectivity_plus: ^7.1.1

  # Charts
  fl_chart: ^1.2.0

  # Utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  collection: ^1.19.0

  # UI Helpers
  shimmer: ^3.0.0
  shared_preferences: ^2.2.0
  google_fonts: ^8.1.0
  lottie: ^3.1.2
  dio_cache_interceptor: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  riverpod_lint: ^3.1.0
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  freezed: ^3.2.3
  custom_lint: ^0.8.1

  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/